<!DOCTYPE html>
<html>
<head>
  <title>CVC Learning App</title>
  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #dff6ff, #ffffff);
      margin: 0;
      padding: 30px;
    }

    .app-box {
      max-width: 700px;
      margin: auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    h1 {
      color: #ff6b6b;
      font-size: 42px;
      margin-bottom: 10px;
    }

    h2 {
      color: #4d96ff;
      font-size: 28px;
      margin-bottom: 25px;
    }

    #word {
      font-size: 48px;
      letter-spacing: 12px;
      margin: 25px 0;
      color: #333;
    }

    .letter-buttons button {
      font-size: 28px;
      font-weight: bold;
      margin: 10px;
      padding: 18px 28px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background-color: #ffd93d;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .action-buttons button {
      font-size: 22px;
      margin: 12px;
      padding: 14px 24px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      color: white;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }

    .check-btn {
      background-color: #6bcB77;
    }

    .reset-btn {
      background-color: #ff6b6b;
    }

    .directions {
      font-size: 20px;
      color: #555;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <div class="app-box">
    <h1>Build the Word!</h1>
    <h2>Make the word: CAT 🐱</h2>
    <p class="directions">Tap the letters to build the word.</p>

    <div id="word">_ _ _</div>

    <div class="letter-buttons">
      <button onclick="addLetter('C')">C</button>
      <button onclick="addLetter('A')">A</button>
      <button onclick="addLetter('T')">T</button>
      <button onclick="addLetter('B')">B</button>
    </div>

    <div class="action-buttons">
      <button class="check-btn" onclick="checkAnswer()">Check Answer</button>
      <button class="reset-btn" onclick="resetWord()">Reset</button>
    </div>
  </div>

  <script>
    let currentWord = [];

    function addLetter(letter) {
      if (currentWord.length < 3) {
        currentWord.push(letter);
        document.getElementById("word").innerText = currentWord.join(" ");
      }
    }

    function checkAnswer() {
      let word = currentWord.join("");

      if (word === "CAT") {
        alert("YESSS! 🎉 Great job!");
      } else {
        alert("Try again 😊");
      }
    }

    function resetWord() {
      currentWord = [];
      document.getElementById("word").innerText = "_ _ _";
    }
  </script>

</body>
</html>
