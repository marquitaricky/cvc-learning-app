<!DOCTYPE html>
<html>
<head>
  <title>CVC Learning App</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(to bottom, #cfefff, #fff8dc);
      min-height: 100vh;
    }

    .app-box {
      max-width: 820px;
      margin: 20px auto;
      background: white;
      border-radius: 28px;
      padding: 30px 25px 40px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      border: 6px solid #ffffff;
    }

    h1 {
      font-size: 54px;
      color: #ff5c5c;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 30px;
      color: #4d8df7;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .directions {
      font-size: 22px;
      color: #555;
      margin-bottom: 20px;
    }

    .score-board {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 25px;
    }

    .score-card {
      background: #f4f9ff;
      border-radius: 18px;
      padding: 12px 20px;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }

    #emoji {
      font-size: 64px;
      margin: 10px 0 0;
    }

    #word {
      font-size: 58px;
      letter-spacing: 14px;
      margin: 25px 0;
      color: #333;
      min-height: 70px;
    }

    .letter-buttons, .action-buttons {
      margin-top: 15px;
    }

    .letter-buttons button {
      font-size: 34px;
      font-weight: bold;
      margin: 10px;
      padding: 18px 28px;
      min-width: 100px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      background-color: #ffd93d;
      box-shadow: 0 5px 10px rgba(0,0,0,0.16);
      transition: transform 0.15s ease;
    }

    .letter-buttons button:hover,
    .action-buttons button:hover {
      transform: scale(1.05);
    }

    .action-buttons button {
      font-size: 24px;
      margin: 10px;
      padding: 15px 24px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      box-shadow: 0 5px 10px rgba(0,0,0,0.16);
    }

    .check-btn {
      background-color: #6bcB77;
    }

    .reset-btn {
      background-color: #ff6b6b;
    }

    .next-btn {
      background-color: #4d96ff;
    }

    #message {
      font-size: 28px;
      font-weight: bold;
      min-height: 40px;
      margin-top: 20px;
      color: #7a3cff;
    }

    #stars {
      font-size: 34px;
      min-height: 45px;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 42px;
      }

      .subtitle {
        font-size: 24px;
      }

      #word {
        font-size: 46px;
        letter-spacing: 10px;
      }

      .letter-buttons button {
        min-width: 80px;
        font-size: 28px;
        padding: 16px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="app-box">
    <h1>Build the Word!</h1>
    <div class="subtitle" id="subtitle">Make the word</div>
    <div class="directions">Tap the letters to build the CVC word.</div>

    <div class="score-board">
      <div class="score-card">Score: <span id="score">0</span></div>
      <div class="score-card">Question: <span id="questionNumber">1</span></div>
    </div>

    <div id="emoji">🐱</div>
    <div id="word">_ _ _</div>

    <div class="letter-buttons" id="letterButtons"></div>

    <div class="action-buttons">
      <button class="check-btn" onclick="checkAnswer()">Check Answer</button>
      <button class="reset-btn" onclick="resetWord()">Reset</button>
      <button class="next-btn" onclick="nextWord()">Next Word</button>
    </div>

    <div id="message"></div>
    <div id="stars"></div>
  </div>

  <script>
    const words = [
      { word: "CAT", emoji: "🐱" },
      { word: "DOG", emoji: "🐶" },
      { word: "SUN", emoji: "☀️" },
      { word: "HAT", emoji: "🧢" },
      { word: "BED", emoji: "🛏️" },
      { word: "PIG", emoji: "🐷" },
      { word: "BUS", emoji: "🚌" },
      { word: "MAP", emoji: "🗺️" }
    ];

    let currentWord = [];
    let currentIndex = 0;
    let score = 0;

    function shuffleArray(array) {
      let copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function loadWord() {
      currentWord = [];
      document.getElementById("word").innerText = "_ _ _";
      document.getElementById("message").innerText = "";
      document.getElementById("stars").innerText = "";

      const item = words[currentIndex];
      document.getElementById("subtitle").innerText = "Build the word for this picture";
      document.getElementById("emoji").innerText = item.emoji;
      document.getElementById("questionNumber").innerText = currentIndex + 1;

      const shuffledLetters = shuffleArray(item.word.split(""));
      const letterButtons = document.getElementById("letterButtons");
      letterButtons.innerHTML = "";

      shuffledLetters.forEach(letter => {
        const btn = document.createElement("button");
        btn.innerText = letter;
        btn.onclick = function() {
          addLetter(letter);
        };
        letterButtons.appendChild(btn);
      });
    }

    function addLetter(letter) {
      if (currentWord.length < 3) {
        currentWord.push(letter);
        document.getElementById("word").innerText = currentWord.join(" ");
      }
    }

    function checkAnswer() {
      const answer = currentWord.join("");
      const correctWord = words[currentIndex].word;

      if (answer === correctWord) {
        score++;
        document.getElementById("score").innerText = score;
        document.getElementById("message").innerText = "Great job! You got it right! 🎉";
        document.getElementById("stars").innerText = "⭐ ⭐ ⭐";
      } else {
        document.getElementById("message").innerText = "Oops! Try again!";
        document.getElementById("stars").innerText = "";
      }
    }

    function resetWord() {
      currentWord = [];
      document.getElementById("word").innerText = "_ _ _";
      document.getElementById("message").innerText = "";
      document.getElementById("stars").innerText = "";
    }

    function nextWord() {
      currentIndex++;

      if (currentIndex >= words.length) {
        document.getElementById("subtitle").innerText = "You finished the game!";
        document.getElementById("emoji").innerText = "🏆";
        document.getElementById("word").innerText = "Y A Y";
        document.getElementById("letterButtons").innerHTML = "";
        document.getElementById("message").innerText = "Final Score: " + score + " out of " + words.length;
        document.getElementById("stars").innerText = "🌟 🌟 🌟";
        document.getElementById("questionNumber").innerText = words.length;
        return;
      }

      loadWord();
    }

    loadWord();
  </script>

</body>
</html>
